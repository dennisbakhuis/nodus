name: Publish Docker image to GHCR

# Builds the single-container production image (frontend + backend, defined
# by the repo-root Dockerfile) and pushes it to GitHub Container Registry.
#
# Pullable as `ghcr.io/${{ github.repository_owner }}/nodus:<VERSION>` after
# a successful run. The image is tagged with both the contents of the
# repo-root `VERSION` file and `latest`. The build fails if the version tag
# already exists in the registry — every release requires a VERSION bump.

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  packages: write

concurrency:
  group: docker-publish-${{ github.ref }}
  cancel-in-progress: false

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/nodus

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Read VERSION file
        id: version
        run: echo "value=$(cat VERSION)" >> "$GITHUB_OUTPUT"

      - name: Lowercase image namespace
        id: image
        run: echo "name=$(echo '${{ env.IMAGE_NAME }}' | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_OUTPUT"

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Fail if version tag already exists in GHCR
        run: |
          IMAGE="${{ env.REGISTRY }}/${{ steps.image.outputs.name }}:${{ steps.version.outputs.value }}"
          if docker manifest inspect "$IMAGE" > /dev/null 2>&1; then
            echo "::error::$IMAGE already exists in GHCR. Bump the VERSION file before merging to main."
            exit 1
          fi
          echo "$IMAGE is free — proceeding with build."

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Compute image tags
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ steps.image.outputs.name }}
          tags: |
            type=raw,value=${{ steps.version.outputs.value }}
            type=raw,value=latest
          labels: |
            org.opencontainers.image.title=Nodus
            org.opencontainers.image.description=Self-hosted Technology Radar webapp
            org.opencontainers.image.version=${{ steps.version.outputs.value }}
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          build-args: |
            APP_VERSION=${{ steps.version.outputs.value }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
