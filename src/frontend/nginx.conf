server {
    listen 80;
    server_name localhost;
    root /usr/share/nginx/html;
    index index.html;

    client_max_body_size 50M;

    # API + OpenAPI surfaces (mirrors the Vite dev proxy in vite.config.ts).
    # The `backend` host resolves via the docker-compose service name.
    location /api/ {
        proxy_pass http://backend:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 300s;
        proxy_buffering off;
    }

    location = /openapi.json { proxy_pass http://backend:8000; }
    location /docs           { proxy_pass http://backend:8000; }
    location /redoc          { proxy_pass http://backend:8000; }

    # SPA routing — anything else falls through to index.html.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
